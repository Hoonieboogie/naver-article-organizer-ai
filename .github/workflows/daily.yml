name: Daily News Monitor

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 10:00 KST (UTC 01:00) — fetch + summarize 모두 실행
  workflow_dispatch:
    inputs:
      phase:
        description: 'fetch / summarize / all'
        required: false
        default: 'fetch'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # docs/data/ JSON 커밋을 위해 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news monitor
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run.py --phase ${{ github.event.inputs.phase || 'all' }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "data: add news results $(date +%Y-%m-%d)"
          git push
