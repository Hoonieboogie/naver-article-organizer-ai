name: Daily News Monitor

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 10:00 KST (UTC 01:00)
  workflow_dispatch:        # 웹 UI "실행" 버튼에서 수동 트리거
    inputs:
      target_date:
        description: '수집 날짜 (YYYY-MM-DD, 비워두면 오늘 KST 기준)'
        required: false
        type: string
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # docs/data/ JSON 커밋을 위해 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news monitor
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: python run.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "data: add news results $(date +%Y-%m-%d)"
          git push
