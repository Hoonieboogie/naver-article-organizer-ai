<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>누나 수고하세요.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6fa;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 헤더 ── */
    header {
      background: white;
      color: black;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    header .date-label { font-size: 12px; color: #aaa; margin-left: auto; }

    /* ── 메인 레이아웃 ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── 사이드바 ── */
    .sidebar {
      width: 240px;
      background: #f0f2f5;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 12px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-section { display: flex; flex-direction: column; gap: 6px; }
    .sidebar-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: #888;
    }

    /* ── 섹션 탭 ── */
    .section-tabs { display: flex; gap: 4px; }
    .section-tab {
      flex: 1; padding: 8px 4px; border: 1px solid #ddd; border-radius: 6px;
      background: white; font-size: 12px; font-weight: 600; cursor: pointer;
      text-align: center; transition: all .15s; color: #666;
    }
    .section-tab.active { background: #4285f4; color: white; border-color: #4285f4; }
    .section-tab:not(.active):hover { border-color: #4285f4; color: #4285f4; }

    /* ── 섹션 이름 편집 ── */
    .section-name-row {
      display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555;
    }
    .section-name-row input {
      flex: 1; padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px;
      font-size: 12px; outline: none;
    }
    .section-name-row input:focus { border-color: #4285f4; }
    .section-name-row button {
      padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px;
      background: white; font-size: 11px; cursor: pointer; color: #666;
    }
    .section-name-row button:hover { border-color: #4285f4; color: #4285f4; }

    .keyword-item {
      display: flex; align-items: center; gap: 6px;
      background: white; border: 1px solid #e0e0e0; border-radius: 6px;
      padding: 7px 10px; cursor: pointer; font-size: 13px;
      transition: border-color .15s;
    }
    .keyword-item:hover { border-color: #4285f4; }
    .keyword-item.active { border-color: #4285f4; background: #e8f0fe; color: #1a73e8; font-weight: 600; }
    .keyword-item .badge {
      margin-left: auto; background: #eee; border-radius: 10px;
      padding: 1px 6px; font-size: 10px; color: #666;
    }
    .keyword-item.active .badge { background: #c8dcfc; color: #1a73e8; }
    .keyword-item .del-btn {
      margin-left: 4px; color: #bbb; font-size: 14px; line-height: 1;
      cursor: pointer; flex-shrink: 0;
    }
    .keyword-item .del-btn:hover { color: #e53935; }

    .add-keyword-row { display: flex; gap: 4px; }
    .add-keyword-row input {
      flex: 1; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px;
      font-size: 12px; outline: none;
    }
    .add-keyword-row input:focus { border-color: #4285f4; }
    .add-keyword-row button {
      padding: 6px 10px; background: #4285f4; color: white; border: none;
      border-radius: 4px; font-size: 12px; cursor: pointer;
    }

    .sidebar-input-row {
      display: flex; align-items: center; gap: 8px; font-size: 12px; color: #555;
    }
    .sidebar-input-row input[type=number] {
      width: 52px; padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px;
      font-size: 12px; text-align: center;
    }

    /* ── 수집 범위 ── */
    .collect-range {
      font-size: 11px; color: #888; background: #e8e8e8; border-radius: 4px;
      padding: 6px 8px; text-align: center; line-height: 1.5;
    }

    .run-btn {
      width: 100%; padding: 10px; background: #34a853; color: white;
      border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background .15s;
    }
    .run-btn:disabled { background: #aaa; cursor: not-allowed; }
    .run-btn:not(:disabled):hover { background: #2d924a; }
    .run-hint { font-size: 10px; color: #999; text-align: center; }

    .settings-btn {
      width: 100%; padding: 7px; background: white; color: #666;
      border: 1px solid #ddd; border-radius: 6px; font-size: 12px; cursor: pointer;
    }
    .settings-btn:hover { border-color: #aaa; }

    /* ── 메인 패널 ── */
    .main { flex: 1; overflow-y: auto; padding: 20px; }

    .main-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .main-header .meta { font-size: 12px; color: #999; margin-left: 10px; }

    .copy-btn {
      padding: 7px 14px; background: white; border: 1px solid #ddd;
      border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap;
    }
    .copy-btn:not(:disabled):hover { border-color: #4285f4; color: #4285f4; }
    .copy-btn:disabled { color: #bbb; cursor: not-allowed; }

    .article-card {
      background: white; border: 1px solid #e0e0e0; border-radius: 8px;
      padding: 14px; margin-bottom: 10px; display: flex; gap: 12px;
      transition: border-color .15s;
    }
    .article-card:hover { border-color: #c0c0c0; }
    .article-card.checked { border-color: #4285f4; background: #fafcff; }

    .article-card input[type=checkbox] {
      margin-top: 2px; flex-shrink: 0; width: 16px; height: 16px; cursor: pointer;
    }
    .article-body { flex: 1; }
    .article-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; line-height: 1.4; display: flex; align-items: baseline; gap: 8px; }
    .article-title a { color: #4285f4; text-decoration: none; font-size: 12px; flex-shrink: 0; }
    .article-title a:hover { text-decoration: underline; }
    .article-source {
      display: inline-block; background: #1a73e8; color: white;
      font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 4px;
      margin-bottom: 6px;
    }
    .article-summary { font-size: 13px; color: #444; line-height: 1.6; margin-bottom: 8px; }
    .article-meta { font-size: 11px; color: #aaa; }

    .empty-state { text-align: center; color: #aaa; padding: 60px 20px; font-size: 14px; }

    .keyword-section { margin-bottom: 24px; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 15px; font-weight: 700; padding: 8px 0;
      border-bottom: 2px solid #e0e0e0; margin-bottom: 10px; color: #333;
      position: sticky; top: 0; background: #f5f6fa; z-index: 1;
    }
    .section-count { font-size: 12px; color: #999; font-weight: 400; }
    .section-empty { font-size: 13px; color: #aaa; padding: 10px 0; }

    /* ── 모달 ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: white; border-radius: 10px; padding: 28px; width: 400px;
      max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .modal h3 { font-size: 16px; margin-bottom: 8px; }
    .modal p { font-size: 13px; color: #555; margin-bottom: 16px; line-height: 1.5; }
    .modal input[type=text], .modal input[type=password] {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 13px; margin-bottom: 12px; outline: none; font-family: monospace;
    }
    .modal input:focus { border-color: #4285f4; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-actions button {
      padding: 8px 18px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none;
    }
    .btn-primary { background: #4285f4; color: white; }
    .btn-secondary { background: #eee; color: #333; }

    /* ── 스피너 ── */
    .spinner {
      width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4);
      border-top-color: white; border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 토스트 ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 10px 20px; border-radius: 20px;
      font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <span>📰</span>
  <h1>뉴스 모니터</h1>
  <span class="date-label" id="headerDate"></span>
</header>

<div class="layout">

  <aside class="sidebar">
    <!-- 섹션 탭 -->
    <div class="sidebar-section">
      <div class="sidebar-label">섹션</div>
      <div class="section-tabs" id="sectionTabs"></div>
      <div class="section-name-row" id="sectionNameRow" style="display:none">
        <input type="text" id="sectionNameInput" placeholder="섹션 이름">
        <button onclick="saveSectionName()">변경</button>
        <button onclick="deleteSection()" style="color:#e53935">삭제</button>
      </div>
    </div>

    <!-- 키워드 -->
    <div class="sidebar-section">
      <div class="sidebar-label">키워드</div>
      <div id="keywordList"></div>
      <div class="add-keyword-row">
        <input type="text" id="newKeywordInput" placeholder="키워드 추가...">
        <button onclick="addKeyword()">+</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">기사 수</div>
      <div class="sidebar-input-row">
        <input type="number" id="articlesPerKeyword" min="1" max="100" value="10"
               onchange="saveArticlesPerKeyword()">
        <span>개 / 키워드</span>
      </div>
    </div>

    <!-- 수집 범위 -->
    <div class="sidebar-section">
      <div class="sidebar-label">수집 범위</div>
      <div class="collect-range" id="collectRange">데이터 없음</div>
    </div>

    <div class="sidebar-section" style="margin-top:auto;">
      <button class="run-btn" id="runBtn" onclick="runWorkflow()">▶ 실행</button>
      <div class="run-hint" id="runHint">약 2~3분 소요</div>
      <button class="settings-btn" onclick="openPatModal()">🔑 토큰 변경</button>
    </div>
  </aside>

  <main class="main" id="mainPanel">
    <div class="empty-state">키워드를 선택하거나 실행해 주세요.</div>
  </main>

</div>

<div class="toast" id="toast"></div>

<!-- PAT 입력 모달 -->
<div class="modal-overlay hidden" id="patModal">
  <div class="modal">
    <h3>🔑 GitHub 토큰 설정</h3>
    <p>repo + workflow 권한의 Classic PAT를 입력하세요.<br>한 번 저장하면 이 브라우저에 계속 유지됩니다.</p>
    <input type="password" id="patInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closePatModal()">취소</button>
      <button class="btn-primary" onclick="savePat()">저장</button>
    </div>
  </div>
</div>

<script>
  const GH_TOKEN = "";
  const GH_REPO  = "";

  let config = { sections: [], articles_per_keyword: 10 };
  let activeSection = 0;   // 현재 선택된 섹션 인덱스
  let currentKeyword = null;
  let availableDates = [];
  let pollingInterval = null;
  let saveConfigQueue = null;
  let savingConfig = false;

  const BASE_DATA_URL = "./data/";

  // ── init ──
  async function init() {
    updateHeaderDate();
    const { token } = getCredentials();
    if (!token) { openPatModal(); return; }
    await loadConfig();
    await scanAvailableDates();
  }

  function updateHeaderDate() {
    const now = new Date();
    document.getElementById("headerDate").textContent =
      now.toLocaleDateString("ko-KR", { year:"numeric", month:"long", day:"numeric" });
  }

  // ── config ──
  async function loadConfig() {
    const { token, repo } = getCredentials();
    if (token && repo) {
      try {
        const res = await fetch(
          `https://api.github.com/repos/${repo}/contents/config.json`,
          { headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json" } }
        );
        if (!res.ok) throw new Error();
        const meta = await res.json();
        config = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\s/g, "")))));
      } catch {
        config = { sections: [], articles_per_keyword: 10 };
      }
    }
    // 구버전 호환: keywords 배열이면 sections로 변환
    if (config.keywords && !config.sections) {
      config.sections = [{ name: "기본", keywords: config.keywords }];
      delete config.keywords;
    }
    if (!config.sections) config.sections = [];
    if (activeSection >= config.sections.length) activeSection = Math.max(0, config.sections.length - 1);
    renderSectionTabs();
    renderKeywordList();
    document.getElementById("articlesPerKeyword").value = config.articles_per_keyword || 10;
  }

  // ── 섹션 탭 ──
  function renderSectionTabs() {
    const container = document.getElementById("sectionTabs");
    container.innerHTML = "";
    config.sections.forEach((sec, i) => {
      const tab = document.createElement("button");
      tab.className = "section-tab" + (i === activeSection ? " active" : "");
      tab.textContent = sec.name;
      tab.addEventListener("click", () => {
        activeSection = i;
        currentKeyword = null;
        renderSectionTabs();
        renderKeywordList();
        renderCurrentSection();
        showSectionNameEditor();
      });
      container.appendChild(tab);
    });
    // + 버튼
    const addBtn = document.createElement("button");
    addBtn.className = "section-tab";
    addBtn.textContent = "+";
    addBtn.style.flex = "0 0 32px";
    addBtn.addEventListener("click", addSection);
    container.appendChild(addBtn);
    showSectionNameEditor();
  }

  async function addSection() {
    const name = "새 섹션";
    config.sections.push({ name, keywords: [] });
    activeSection = config.sections.length - 1;
    renderSectionTabs();
    renderKeywordList();
    renderCurrentSection();
    await saveConfig();
  }

  async function deleteSection() {
    if (config.sections.length <= 1) { showToast("섹션은 최소 1개 필요합니다."); return; }
    config.sections.splice(activeSection, 1);
    activeSection = Math.min(activeSection, config.sections.length - 1);
    renderSectionTabs();
    renderKeywordList();
    renderCurrentSection();
    await saveConfig();
  }

  function showSectionNameEditor() {
    const row = document.getElementById("sectionNameRow");
    const sec = config.sections[activeSection];
    if (!sec) { row.style.display = "none"; return; }
    row.style.display = "flex";
    document.getElementById("sectionNameInput").value = sec.name;
  }

  async function saveSectionName() {
    const input = document.getElementById("sectionNameInput");
    const name = input.value.trim();
    if (!name) return;
    config.sections[activeSection].name = name;
    renderSectionTabs();
    await saveConfig();
  }

  // ── 키워드 ──
  function getCurrentKeywords() {
    const sec = config.sections[activeSection];
    return sec ? sec.keywords || [] : [];
  }

  function renderKeywordList() {
    const list = document.getElementById("keywordList");
    list.innerHTML = "";
    getCurrentKeywords().forEach(kw => {
      const el = document.createElement("div");
      el.className = "keyword-item" + (kw === currentKeyword ? " active" : "");

      const label = document.createElement("span");
      label.style.cssText = "flex:1;cursor:pointer";
      label.textContent = kw;
      label.addEventListener("click", () => selectKeyword(kw));

      const badge = document.createElement("span");
      badge.className = "badge";
      badge.dataset.keyword = kw;
      badge.textContent = "-";

      const del = document.createElement("span");
      del.className = "del-btn";
      del.textContent = "\u2715";
      del.addEventListener("click", (e) => { e.stopPropagation(); removeKeyword(kw); });

      el.appendChild(label);
      el.appendChild(badge);
      el.appendChild(del);
      list.appendChild(el);
    });
  }

  async function addKeyword() {
    const input = document.getElementById("newKeywordInput");
    const kw = input.value.trim();
    const sec = config.sections[activeSection];
    if (!kw || !sec) return;
    if (!sec.keywords) sec.keywords = [];
    if (sec.keywords.includes(kw)) return;
    sec.keywords.push(kw);
    input.value = "";
    renderKeywordList();
    await saveConfig();
  }

  async function removeKeyword(kw) {
    const sec = config.sections[activeSection];
    if (!sec) return;
    sec.keywords = sec.keywords.filter(k => k !== kw);
    if (currentKeyword === kw) currentKeyword = null;
    renderKeywordList();
    await saveConfig();
  }

  function selectKeyword(kw) {
    currentKeyword = kw;
    renderKeywordList();
    const section = document.querySelector(`[data-section="${CSS.escape(kw)}"]`);
    if (section) section.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  // ── 수집 범위 표시 ──
  function updateCollectRange(data) {
    const el = document.getElementById("collectRange");
    if (!data || !data.generated_at) {
      el.textContent = "데이터 없음";
      return;
    }
    const end = new Date(data.generated_at);
    const start = new Date(end.getTime() - 24 * 60 * 60 * 1000);
    const fmt = (d) => d.toLocaleString("ko-KR", { month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit" });
    el.textContent = fmt(start) + "  ~  " + fmt(end);
  }

  // ── 데이터 로드 ──
  async function scanAvailableDates(viaApi = false) {
    availableDates = [];
    const { token, repo } = getCredentials();
    if (viaApi && token && repo) {
      try {
        const res = await fetch(
          `https://api.github.com/repos/${repo}/contents/docs/data/index.json`,
          { headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json" } }
        );
        if (res.ok) {
          const meta = await res.json();
          const data = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\s/g, "")))));
          availableDates = (data.dates || []).sort().reverse();
        }
      } catch {}
    }
    if (availableDates.length === 0) {
      try {
        const res = await fetch(BASE_DATA_URL + "index.json?t=" + Date.now());
        if (res.ok) {
          const data = await res.json();
          availableDates = (data.dates || []).sort().reverse();
        }
      } catch {}
    }
    if (availableDates.length > 0) loadDate(availableDates[0], viaApi);
  }

  async function loadDate(dateStr, viaApi = false) {
    if (!dateStr) return;
    let data = null;
    const { token, repo } = getCredentials();
    if (viaApi && token && repo) {
      try {
        const res = await fetch(
          `https://api.github.com/repos/${repo}/contents/docs/data/${dateStr}.json`,
          { headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json" } }
        );
        if (res.ok) {
          const meta = await res.json();
          data = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\s/g, "")))));
        }
      } catch {}
    }
    if (!data) {
      try {
        const res = await fetch(BASE_DATA_URL + dateStr + ".json?t=" + Date.now());
        if (!res.ok) throw new Error();
        data = await res.json();
      } catch {
        showEmptyState("선택한 날짜의 데이터를 불러올 수 없습니다.");
        return;
      }
    }
    window.__lastData = data;
    updateCollectRange(data);
    updateBadges(data);
    renderCurrentSection();
  }

  function updateBadges(data) {
    if (!data) return;
    const sections = data.sections || [];
    // 구버전 호환
    const keywords = data.keywords || [];
    const allKw = [];
    sections.forEach(s => (s.keywords || []).forEach(kd => allKw.push(kd)));
    keywords.forEach(kd => allKw.push(kd));
    allKw.forEach(kd => {
      const badge = document.querySelector(`[data-keyword="${CSS.escape(kd.keyword)}"]`);
      if (badge) badge.textContent = kd.articles.length;
    });
  }

  // ── 렌더링 ──
  function renderCurrentSection() {
    const data = window.__lastData;
    if (!data) { showEmptyState("실행 버튼을 눌러 기사를 수집하세요."); return; }

    const sec = config.sections[activeSection];
    if (!sec) { showEmptyState("섹션을 추가하세요."); return; }

    // 데이터에서 현재 섹션의 키워드들 찾기
    let kwDataList = [];
    const dataSections = data.sections || [];
    const dataSection = dataSections.find(s => s.name === sec.name);
    if (dataSection) {
      kwDataList = dataSection.keywords || [];
    } else {
      // 구버전 호환: sections 없이 keywords만 있는 경우
      const allKwData = data.keywords || [];
      const myKws = new Set(sec.keywords);
      kwDataList = allKwData.filter(kd => myKws.has(kd.keyword));
    }

    const totalArticles = kwDataList.reduce((sum, k) => sum + (k.articles || []).length, 0);
    const panel = document.getElementById("mainPanel");

    if (kwDataList.length === 0) {
      showEmptyState("이 섹션에 수집된 기사가 없습니다.");
      return;
    }

    panel.innerHTML = "";
    const headerDiv = document.createElement("div");
    headerDiv.className = "main-header";
    const metaSpan = document.createElement("span");
    metaSpan.className = "meta";
    metaSpan.textContent = sec.name + " · 총 " + totalArticles + "개 기사";
    const copyBtn = document.createElement("button");
    copyBtn.className = "copy-btn";
    copyBtn.id = "copyBtn";
    copyBtn.disabled = true;
    copyBtn.textContent = "📋 선택 항목 복사";
    copyBtn.addEventListener("click", copySelected);
    headerDiv.appendChild(metaSpan);
    headerDiv.appendChild(copyBtn);
    panel.appendChild(headerDiv);

    const list = document.createElement("div");
    list.id = "articleList";
    let cardIndex = 0;

    kwDataList.forEach(kd => {
      const articles = kd.articles || [];
      const section = document.createElement("div");
      section.className = "keyword-section";
      section.dataset.section = kd.keyword;

      const header = document.createElement("div");
      header.className = "section-header";
      const headerLabel = document.createElement("span");
      headerLabel.textContent = kd.keyword;
      const headerCount = document.createElement("span");
      headerCount.className = "section-count";
      headerCount.textContent = articles.length + "개";
      header.appendChild(headerLabel);
      header.appendChild(headerCount);
      section.appendChild(header);

      if (articles.length === 0) {
        const empty = document.createElement("div");
        empty.className = "section-empty";
        empty.textContent = "수집된 기사가 없습니다.";
        section.appendChild(empty);
      } else {
        articles.forEach(art => {
          const idx = cardIndex++;
          const card = document.createElement("div");
          card.className = "article-card";
          card.dataset.keyword = kd.keyword;
          card.dataset.url = art.url;

          const chk = document.createElement("input");
          chk.type = "checkbox";
          chk.id = "chk-" + idx;
          chk.addEventListener("change", onCheckChange);

          const body = document.createElement("div");
          body.className = "article-body";

          if (art.source_name) {
            const sourceSpan = document.createElement("span");
            sourceSpan.className = "article-source";
            sourceSpan.textContent = art.source_name;
            body.appendChild(sourceSpan);
          }

          const titleDiv = document.createElement("div");
          titleDiv.className = "article-title";
          const titleText = document.createElement("span");
          titleText.textContent = art.title;
          const link = document.createElement("a");
          link.href = art.url;
          link.target = "_blank";
          link.rel = "noopener";
          link.textContent = "\u2197";
          titleDiv.appendChild(titleText);
          titleDiv.appendChild(link);

          const descDiv = document.createElement("div");
          descDiv.className = "article-summary";
          descDiv.textContent = art.description || "";

          const metaDiv = document.createElement("div");
          metaDiv.className = "article-meta";
          metaDiv.textContent = formatTime(art.published_at);

          body.appendChild(titleDiv);
          body.appendChild(descDiv);
          body.appendChild(metaDiv);
          card.appendChild(chk);
          card.appendChild(body);
          section.appendChild(card);
        });
      }
      list.appendChild(section);
    });
    panel.appendChild(list);
  }

  function formatTime(isoStr) {
    if (!isoStr) return "";
    try {
      return new Date(isoStr).toLocaleString("ko-KR", {
        month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit"
      });
    } catch { return isoStr; }
  }

  // ── 체크/복사 ──
  function onCheckChange() {
    const anyChecked = document.querySelectorAll(".article-card input[type=checkbox]:checked").length > 0;
    const btn = document.getElementById("copyBtn");
    if (btn) btn.disabled = !anyChecked;
    document.querySelectorAll(".article-card").forEach(card => {
      const chk = card.querySelector("input[type=checkbox]");
      if (chk) card.classList.toggle("checked", chk.checked);
    });
  }

  function copySelected() {
    const checkedCards = document.querySelectorAll(".article-card input[type=checkbox]:checked");
    if (!checkedCards.length) return;
    const grouped = {};
    checkedCards.forEach(chk => {
      const card = chk.closest(".article-card");
      const kw = card.dataset.keyword;
      const url = card.dataset.url;
      if (!grouped[kw]) grouped[kw] = [];
      grouped[kw].push(url);
    });
    const text = Object.entries(grouped)
      .map(([kw, urls]) => kw + "\n" + urls.map(u => "* " + u).join("\n"))
      .join("\n\n");
    navigator.clipboard.writeText(text)
      .then(() => showToast("복사됨!"))
      .catch(() => showToast("복사 실패: 클립보드 권한을 확인하세요."));
  }

  // ── config 저장 ──
  async function saveArticlesPerKeyword() {
    const val = parseInt(document.getElementById("articlesPerKeyword").value);
    if (isNaN(val) || val < 1 || val > 100) return;
    config.articles_per_keyword = val;
    await saveConfig();
  }

  async function saveConfig() {
    if (savingConfig) {
      // 이미 저장 중이면 대기 후 재실행
      saveConfigQueue = true;
      return;
    }
    const { token, repo } = getCredentials();
    if (!token || !repo) { showToast("GitHub 설정이 필요합니다."); return; }
    savingConfig = true;
    try {
      const metaRes = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
        headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json" }
      });
      if (!metaRes.ok) throw new Error("config.json을 읽을 수 없습니다 (" + metaRes.status + ")");
      const meta = await metaRes.json();
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(config, null, 2))));
      const res = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
        method: "PUT",
        headers: {
          Authorization: `token ${token}`,
          "Content-Type": "application/json",
          Accept: "application/vnd.github.v3+json"
        },
        body: JSON.stringify({ message: "config: update via web UI", content, sha: meta.sha })
      });
      if (!res.ok) throw new Error(await res.text());
      showToast("저장됨 ✓");
    } catch (e) {
      showToast("저장 실패: " + e.message);
    } finally {
      savingConfig = false;
      if (saveConfigQueue) {
        saveConfigQueue = false;
        await saveConfig();
      }
    }
  }

  // ── 실행 / 폴링 ──
  async function runWorkflow() {
    const { token, repo } = getCredentials();
    if (!token || !repo) { showToast("GH_TOKEN / GH_REPO 설정이 필요합니다."); return; }

    const btn = document.getElementById("runBtn");
    btn.disabled = true;
    btn.innerHTML = `<div class="spinner"></div> 실행 중...`;
    document.getElementById("runHint").textContent = "기사 수집 중...";

    try {
      const res = await fetch(
        `https://api.github.com/repos/${repo}/actions/workflows/daily.yml/dispatches`,
        {
          method: "POST",
          headers: {
            Authorization: `token ${token}`,
            "Content-Type": "application/json",
            Accept: "application/vnd.github.v3+json"
          },
          body: JSON.stringify({ ref: "main" })
        }
      );
      if (!res.ok) throw new Error("workflow dispatch 실패: " + res.status);
      showToast("실행 시작!");
      setTimeout(() => startPolling(token, repo), 5000);
    } catch (e) {
      showToast("실행 실패: " + e.message);
      resetButtons();
    }
  }

  function startPolling(token, repo) {
    if (pollingInterval) clearInterval(pollingInterval);
    let elapsed = 0;
    const MAX_WAIT = 30 * 60 * 1000;

    function setStatus(msg) {
      document.getElementById("runHint").textContent = msg;
    }

    async function fetchStatusFromLogs(jobId) {
      try {
        const res = await fetch(
          `https://api.github.com/repos/${repo}/actions/jobs/${jobId}/logs`,
          { headers: { Authorization: `token ${token}` } }
        );
        if (!res.ok) return null;
        const text = await res.text();
        const lines = text.split("\n").filter(l => l.includes("[STATUS]"));
        if (!lines.length) return null;
        const match = lines[lines.length - 1].match(/\[STATUS\]\s+(.+)/);
        return match ? match[1].trim() : null;
      } catch { return null; }
    }

    pollingInterval = setInterval(async () => {
      elapsed += 5000;
      if (elapsed > MAX_WAIT) {
        clearInterval(pollingInterval);
        showToast("시간 초과: 나중에 다시 확인해주세요.");
        resetButtons();
        return;
      }
      try {
        const res = await fetch(
          `https://api.github.com/repos/${repo}/actions/runs?per_page=1&event=workflow_dispatch`,
          { headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json" } }
        );
        const data = await res.json();
        const run = data.workflow_runs?.[0];
        if (!run) return;

        if (run.status === "completed") {
          clearInterval(pollingInterval);
          if (run.conclusion === "success") {
            showToast("완료! 결과를 불러옵니다...");
            await scanAvailableDates(true);
          } else {
            showToast("실행 중 오류가 발생했습니다.");
          }
          resetButtons();
          return;
        }

        try {
          const jobsRes = await fetch(
            `https://api.github.com/repos/${repo}/actions/runs/${run.id}/jobs`,
            { headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json" } }
          );
          const jobsData = await jobsRes.json();
          const job = jobsData.jobs?.[0];
          if (!job) return;

          const mins = Math.floor(elapsed / 60000);
          const secs = String(Math.floor((elapsed % 60000) / 1000)).padStart(2, "0");
          const activeStep = job.steps?.find(s => s.status === "in_progress");

          const SETUP_LABELS = {
            "Checkout": "⬇️ 코드 준비 중",
            "Set up Python": "🐍 Python 환경 설정 중",
            "Install dependencies": "📦 패키지 설치 중",
          };
          let label;
          if (!activeStep) {
            label = run.status === "queued" ? "⏳ 실행 대기 중" : "⏳ 시작 중";
          } else if (SETUP_LABELS[activeStep.name]) {
            label = SETUP_LABELS[activeStep.name];
          } else if (activeStep.name === "Run news monitor") {
            const logStatus = await fetchStatusFromLogs(job.id);
            label = logStatus ? `📰 ${logStatus}` : "📰 기사 수집 중";
          } else if (activeStep.name === "Commit results") {
            label = "💾 결과 저장 중";
          } else {
            label = "⏳ 준비 중";
          }
          setStatus(`${label} (${mins}:${secs} 경과)`);
        } catch {}

      } catch {}
    }, 5000);
  }

  function resetButtons() {
    const runBtn = document.getElementById("runBtn");
    runBtn.disabled = false;
    runBtn.innerHTML = "▶ 실행";
    document.getElementById("runHint").textContent = "약 2~3분 소요";
  }

  // ── 유틸리티 ──
  function getCredentials() {
    const token = GH_TOKEN || localStorage.getItem("gh_pat") || "";
    let repo = GH_REPO;
    if (!repo) {
      const host = window.location.hostname;
      const path = window.location.pathname;
      if (host.endsWith(".github.io")) {
        const username = host.replace(".github.io", "");
        const segment  = path.split("/").filter(Boolean)[0] || "";
        if (username && segment) repo = `${username}/${segment}`;
      }
    }
    return { token, repo };
  }

  function openPatModal() {
    const current = localStorage.getItem("gh_pat") || "";
    document.getElementById("patInput").value = current;
    document.getElementById("patModal").classList.remove("hidden");
  }
  function closePatModal() { document.getElementById("patModal").classList.add("hidden"); }
  function savePat() {
    const val = document.getElementById("patInput").value.trim();
    if (!val) return;
    localStorage.setItem("gh_pat", val);
    closePatModal();
    showToast("토큰 저장됨 ✓");
    init();
  }

  function showEmptyState(msg) {
    const panel = document.getElementById("mainPanel");
    panel.innerHTML = "";
    const div = document.createElement("div");
    div.className = "empty-state";
    div.textContent = msg;
    panel.appendChild(div);
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  document.getElementById("newKeywordInput").addEventListener("keydown", e => {
    if (e.key === "Enter") addKeyword();
  });

  init();
</script>
